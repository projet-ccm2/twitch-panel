<!DOCTYPE html>
<html>
<head>
    <title>Achievements Panel</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #efeff1;
            background: #18181b;
            margin: 0;
            padding: 0;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 2px solid #2f2f35;
        }
        .tab {
            flex: 1;
            padding: 10px 0;
            background: none;
            border: none;
            color: #adadb8;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active { color: #bf94ff; border-bottom-color: #bf94ff; }
        .tab:hover { color: #efeff1; }

        #tab-content { padding: 12px; }

        /* Stats */
        .stats { list-style: none; padding: 0; margin: 0 0 12px; }
        .stats li {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2f2f35;
            font-size: 14px;
        }
        .stats li:last-child { border-bottom: none; }
        .stats .value { font-weight: bold; color: #bf94ff; }

        /* Links / Buttons */
        a { color: #bf94ff; text-decoration: none; font-size: 13px; }
        a:hover { text-decoration: underline; }
        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: #bf94ff;
            color: #18181b;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
        }
        .btn:hover { background: #a970ff; }
        .reload-btn {
            display: block;
            margin: 12px auto 0;
            cursor: pointer;
            border: none;
            font-size: 13px;
        }

        /* Register */
        .register { text-align: center; padding: 20px 0; }
        .register p { margin: 0 0 12px; font-size: 14px; color: #adadb8; }
        .hint { font-size: 12px; color: #bf94ff; margin-top: 10px; }

        /* States */
        .error { color: #eb0400; font-size: 13px; }
        .loading { color: #adadb8; font-size: 13px; }
        .coming-soon { color: #adadb8; font-size: 13px; text-align: center; padding: 20px 0; }

        /* Podium */
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 6px;
            margin-bottom: 12px;
            padding: 8px 0;
        }
        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 6px;
            border-radius: 4px;
            background: #2f2f35;
            min-width: 70px;
        }
        .podium-item.rank-1 { border: 1px solid #ffd700; order: 2; }
        .podium-item.rank-2 { border: 1px solid #c0c0c0; order: 1; margin-top: 16px; }
        .podium-item.rank-3 { border: 1px solid #cd7f32; order: 3; margin-top: 28px; }
        .medal { font-size: 20px; }
        .podium-item .name { font-size: 11px; margin: 4px 0; color: #efeff1; }
        .podium-item .xp { font-size: 11px; color: #bf94ff; font-weight: bold; }

        /* Leaderboard list */
        .lb-list { list-style: none; padding: 0; margin: 0; }
        .lb-list li {
            display: flex;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #2f2f35;
            font-size: 13px;
        }
        .lb-list li:last-child { border-bottom: none; }
        .lb-list .rank { width: 28px; color: #adadb8; }
        .lb-list .name { flex: 1; }
        .lb-list .xp { color: #bf94ff; font-weight: bold; }

        /* Achievement cards */
        .ach-list { list-style: none; padding: 0; margin: 0; }
        .ach-card {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #2f2f35;
        }
        .ach-card:last-child { border-bottom: none; }
        .ach-card.locked { opacity: 0.45; }
        .ach-img {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .ach-initials {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2f2f35;
            color: #bf94ff;
            font-size: 18px;
            font-weight: bold;
        }
        .ach-info { flex: 1; min-width: 0; }
        .ach-title {
            font-size: 13px;
            font-weight: bold;
            color: #efeff1;
            margin: 0 0 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ach-desc {
            font-size: 11px;
            color: #adadb8;
            margin: 0 0 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .ach-bar-wrap {
            height: 6px;
            background: #2f2f35;
            border-radius: 3px;
            overflow: hidden;
        }
        .ach-bar {
            height: 100%;
            background: #bf94ff;
            border-radius: 3px;
            transition: width .3s;
        }
        .ach-card.locked .ach-bar { background: #adadb8; }
        .ach-progress-text {
            font-size: 10px;
            color: #adadb8;
            margin-top: 2px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div id="app"><span class="loading" style="padding:12px;display:block">Loading...</span></div>

    <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
    <script src="config.js"></script>
    <script src="panel.js"></script>
</body>
</html>
